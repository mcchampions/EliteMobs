# This workflow will build a Java project with Gradle

name: Builder

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
          java-package: jdk
          architecture: x64
          cache: gradle
      - name: Build
        run: gradle build --no-daemon
      - uses: actions/upload-artifact@v7
        name: Upload Beta artifact
        with:
          name: Build
          path: build/libs/